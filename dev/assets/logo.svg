<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200" role="img" aria-label="Luximm.jl logo">
  <title>Luximm.jl</title>
  <desc>Luximm.jl logo: three isometric cubes in Julia's red, green, and purple — representing the three channels of an image tensor — arranged in a triangle, set beside the Luximm.jl wordmark in matching Julia colors.</desc>

  <defs>
    <!-- Larger isometric cubes for the standalone mark. Edge ~46, dx=40, dy=23. -->
    <symbol id="cube-red-lg" overflow="visible">
      <polygon points="0,-23 40,-46 80,-23 40,0" fill="#E5675E" stroke="#5A130F" stroke-width="1.5" stroke-linejoin="round"/>
      <polygon points="40,0 80,-23 80,23 40,46"  fill="#CB3C33" stroke="#5A130F" stroke-width="1.5" stroke-linejoin="round"/>
      <polygon points="0,-23 40,0 40,46 0,23"    fill="#8E261F" stroke="#5A130F" stroke-width="1.5" stroke-linejoin="round"/>
    </symbol>
    <symbol id="cube-green-lg" overflow="visible">
      <polygon points="0,-23 40,-46 80,-23 40,0" fill="#5BC247" stroke="#143E0D" stroke-width="1.5" stroke-linejoin="round"/>
      <polygon points="40,0 80,-23 80,23 40,46"  fill="#389826" stroke="#143E0D" stroke-width="1.5" stroke-linejoin="round"/>
      <polygon points="0,-23 40,0 40,46 0,23"    fill="#22651A" stroke="#143E0D" stroke-width="1.5" stroke-linejoin="round"/>
    </symbol>
    <symbol id="cube-purple-lg" overflow="visible">
      <polygon points="0,-23 40,-46 80,-23 40,0" fill="#B273C9" stroke="#3D1F55" stroke-width="1.5" stroke-linejoin="round"/>
      <polygon points="40,0 80,-23 80,23 40,46"  fill="#9558B2" stroke="#3D1F55" stroke-width="1.5" stroke-linejoin="round"/>
      <polygon points="0,-23 40,0 40,46 0,23"    fill="#643A7A" stroke="#3D1F55" stroke-width="1.5" stroke-linejoin="round"/>
    </symbol>
  </defs>

  <!-- ====== CUBE MARK (pyramid stack) ======
       Two cubes form the base sitting edge-to-edge in iso projection
       (centers 2*dx = 80 apart). The third cube sits on top, centered
       in the valley between them. Draw order: base first, then top,
       so the top cube correctly occludes the back portions of the base.

       Cube edge = 46 (dx=40, dy=23). Cube spans x:[ox, ox+80], y:[oy-46, oy+46].
       Base cubes share their adjacent vertical edges at x=115.
       Top cube sits 3*dy = 69 above the base row vertically. -->
  <g>
    <use href="#cube-purple-lg" x="35"  y="144"/>
    <use href="#cube-green-lg"  x="115" y="144"/>
    <use href="#cube-red-lg"    x="75"  y="75"/>
  </g>

  <!-- ====== WORDMARK ======
       One text element so all glyphs flow with the font's natural metrics. The
       separator is the convolution operator ∗ (U+2217 ASTERISK OPERATOR), which is
       the defining operation of convnets — a tighter fit for Luximm.jl than a plain dot.

       Color plan (each glyph outlined to match the cubes' stroke language):
         Luximm  → Julia purple (#9558B2) / stroke #3D1F55
         ∗     → neutral gray (#7A8294) / stroke #3A4252
         j     → Julia red    (#CB3C33) / stroke #5A130F
         l     → Julia green  (#389826) / stroke #143E0D
  -->
  <g transform="translate(200,128)"
     font-family="'Helvetica Neue', Helvetica, 'Liberation Sans', Arial, sans-serif"
     font-weight="800"
     stroke-linejoin="round" paint-order="stroke">
    <text x="0" y="0" font-size="65" letter-spacing="-3" stroke-width="2">
      <tspan fill="#9558B2" stroke="#3D1F55">Luximm</tspan><tspan fill="#7A8294" stroke="#3A4252">&#8727;</tspan><tspan fill="#CB3C33" stroke="#5A130F">j</tspan><tspan fill="#389826" stroke="#143E0D">l</tspan>
    </text>
  </g>
</svg>